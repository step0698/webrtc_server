services:
  postgres:
    image: postgres:16-alpine
    container_name: webrtc_server_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prisma:
    image: node:22-alpine
    container_name: webrtc_server_prisma
    working_dir: /app
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${PRISMA_DATABASE_URL:?PRISMA_DATABASE_URL is required}
    volumes:
      - ../../:/app
      - prisma_node_modules:/app/node_modules
    command:
      - /bin/sh
      - -c
      - |
        npm ci
        npx prisma db push --schema db/prisma/schema.prisma

volumes:
  postgres_data:
  prisma_node_modules:
